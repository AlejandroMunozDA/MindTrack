<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hábitos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14;
      --surface: #1a1a26;
      --surface2: #22223a;
      --border: #2e2e4a;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --accent: #7c6ef7;
      --accent2: #5de0c7;
      --danger: #f76c6c;
      --done: #9a9ab0;
      --radius: 14px;
      --radius-sm: 8px;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* ── Header ── */
    header {
      position:sticky; top:0; z-index:10;
      background:rgba(15,15,20,.88); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:14px 20px;
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; gap:8px;
    }
    header .h-left { display:flex; align-items:center; gap:10px; }
    header .h-center { text-align:center; }
    header .h-right { display:flex; align-items:center; justify-content:flex-end; gap:10px; }
    header h1 {
      font-size:1.35rem; font-weight:700;
      background:linear-gradient(135deg,#a89cff,#6ef7d0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* ── Icon buttons ── */
    .icon-btn {
      width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:transform .18s,background .18s; color:var(--text); font-size:.8rem;
    }
    .icon-btn:hover { background:rgba(255,255,255,.15); transform:scale(1.1); }
    .icon-btn svg { pointer-events:none; }

    #btn-add-habit, #btn-add-note {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; color:#fff; font-size:1.3rem; font-weight:300;
      box-shadow:0 3px 14px rgba(124,110,247,.4);
    }
    #btn-add-habit:hover, #btn-add-note:hover { transform:scale(1.12) rotate(90deg); }

    /* H brand button */
    #btn-go-habits {
      font-size:.95rem; font-weight:800; letter-spacing:-.5px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; color:#fff;
    }

    /* ── Page switch ── */
    .page { display:none; flex:1; flex-direction:column; }
    .page.active { display:flex; }

    /* ── Main content wrapper ── */
    .content { flex:1; padding:24px 20px; max-width:700px; width:100%; margin:0 auto; }

    /* ── Empty state ── */
    .empty-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; padding:80px 20px; color:var(--text-muted); text-align:center;
    }
    .empty-state svg { opacity:.3; }
    .empty-state p { font-size:.93rem; }

    /* ── Habit bars / Note bars ── */
    .habit-list, .note-list { display:flex; flex-direction:column; gap:14px; }

    .habit-bar, .note-bar {
      border-radius:var(--radius); transition:transform .2s,box-shadow .2s;
    }
    .habit-bar:hover, .note-bar:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.4); }

    .bar-inner {
      border-radius:var(--radius); padding:15px 16px;
      display:grid; grid-template-columns:1fr auto; grid-template-rows:auto auto;
      column-gap:12px; row-gap:5px;
      border:1px solid rgba(255,255,255,.07);
      transition:filter .4s;
    }
    .habit-bar.completed .bar-inner, .note-bar.done .bar-inner {
      filter:brightness(.5) saturate(.35);
    }

    .bar-name { font-size:.97rem; font-weight:600; grid-column:1; grid-row:1; align-self:center; }
    .bar-meta { grid-column:1; grid-row:2; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }

    .day-pill {
      font-size:.66rem; font-weight:600; padding:2px 8px; border-radius:30px;
      background:rgba(255,255,255,.12); color:rgba(255,255,255,.85); letter-spacing:.4px;
    }

    /* Action column */
    .bar-actions {
      grid-column:2; grid-row:1/3;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px;
    }
    .btn-ic {
      background:rgba(0,0,0,.22); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .15s,background .15s; color:#fff; border-radius:50%;
    }
    .btn-ic:hover { transform:scale(1.18); }
    .btn-circle { width:32px; height:32px; border:2px solid rgba(255,255,255,.4); background:rgba(255,255,255,.12); }
    .btn-circle:hover { background:rgba(255,255,255,.28); }
    .btn-sm { width:26px; height:26px; border-radius:var(--radius-sm); }
    .btn-sm.del:hover { background:rgba(247,108,108,.35); }
    .btn-sm.edit-btn:hover { background:rgba(255,255,255,.18); }

    /* ── Modals ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.65);
      backdrop-filter:blur(6px); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--surface); border:1px solid var(--border); border-radius:20px;
      padding:26px 22px; width:100%; max-width:430px;
      transform:translateY(20px) scale(.96); transition:transform .25s;
    }
    .modal-overlay.open .modal { transform:translateY(0) scale(1); }
    .modal h2 { font-size:1.1rem; font-weight:700; margin-bottom:20px; }

    /* form elements */
    .form-group { margin-bottom:16px; display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; }
    .form-group input[type="text"], .form-group input[type="color"] { font-family:inherit; }
    input[type="text"] {
      background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
      color:var(--text); font-size:.93rem; padding:9px 13px; outline:none; width:100%;
      transition:border-color .2s;
    }
    input[type="text"]:focus { border-color:var(--accent); }

    /* Days */
    .days-grid { display:flex; gap:6px; flex-wrap:wrap; }
    .day-btn {
      width:42px; height:42px; border-radius:50%; border:2px solid var(--border);
      background:var(--surface2); color:var(--text-muted); font-size:.72rem; font-weight:700;
      cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .day-btn:hover { border-color:var(--accent); color:var(--text); }
    .day-btn.selected { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 10px rgba(124,110,247,.5); }

    /* Colors */
    .color-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .color-swatch {
      width:48px; height:30px; border-radius:8px; border:2.5px solid transparent;
      cursor:pointer; transition:transform .15s,border-color .15s;
    }
    .color-swatch:hover { transform:scale(1.1); }
    .color-swatch.active { border-color:#fff; transform:scale(1.1); box-shadow:0 0 10px rgba(255,255,255,.4); }
    input[type="color"] {
      width:32px; height:32px; border-radius:50%; border:2px solid var(--border);
      padding:2px; background:none; cursor:pointer;
    }

    /* Modal buttons */
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
    .btn-cancel {
      padding:8px 18px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:transparent; color:var(--text-muted); font-family:inherit; font-size:.85rem; cursor:pointer;
      transition:background .15s;
    }
    .btn-cancel:hover { background:var(--surface2); }
    .btn-save {
      padding:8px 20px; border-radius:var(--radius-sm); border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-family:inherit; font-size:.85rem; font-weight:600; cursor:pointer;
      box-shadow:0 3px 14px rgba(124,110,247,.4); transition:transform .15s,box-shadow .15s;
    }
    .btn-save:hover { transform:translateY(-1px); box-shadow:0 5px 20px rgba(124,110,247,.55); }
    .btn-danger {
      padding:8px 20px; border-radius:var(--radius-sm); border:none;
      background:var(--danger); color:#fff; font-family:inherit; font-size:.85rem; font-weight:600; cursor:pointer;
    }
    .btn-danger:hover { opacity:.85; }
    .confirm-text { color:var(--text-muted); font-size:.9rem; line-height:1.55; margin-bottom:4px; }
    .confirm-text strong { color:var(--text); }

    /* ── Calendar modal (wider) ── */
    #modal-calendar .modal { max-width:370px; }
    .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .cal-month-title { font-weight:700; font-size:1rem; }
    .cal-streak-badge {
      display:flex; align-items:center; gap:6px; padding:5px 12px;
      background:linear-gradient(135deg,#5b1fff44,#7c6ef733);
      border:1px solid var(--accent); border-radius:30px; font-size:.8rem; font-weight:600;
      color:var(--accent);
    }
    .cal-streak-badge svg { flex-shrink:0; }
    .cal-grid {
      display:grid; grid-template-columns:repeat(7,1fr); gap:5px; text-align:center;
    }
    .cal-day-name { font-size:.65rem; color:var(--text-muted); font-weight:600; padding-bottom:3px; letter-spacing:.5px; }
    .cal-cell {
      aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      font-size:.78rem; border-radius:50%; position:relative;
    }

    .cal-cell.today {
      background:rgba(124,110,247,.2); border:1px solid var(--accent);
      color:var(--accent); font-weight:700;
    }
    .cal-cell.perfect {
      background:var(--accent); color:#fff; font-weight:700;
      box-shadow:0 0 10px rgba(124,110,247,.6);
    }

    /* ── Note editor view ── */
    #page-note-editor { background:var(--bg); }
    .note-editor-header {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; padding:14px 20px;
      border-bottom:1px solid var(--border);
      background:rgba(15,15,20,.88); backdrop-filter:blur(14px);
    }
    .note-editor-header .h-left { display:flex; }
    .note-editor-header .h-center h1 { font-size:1.1rem; font-weight:700; text-align:center; color:var(--text-muted); }
    .note-editor-header .h-right { display:flex; justify-content:flex-end; }

    .note-sheet {
      flex:1; margin:20px auto; width:100%; max-width:680px; padding:0 16px;
      display:flex; flex-direction:column; gap:14px;
    }
    .note-title-input {
      background:transparent; border:none; border-bottom:1px solid var(--border);
      color:var(--text); font-family:inherit; font-size:1.2rem; font-weight:700;
      padding:8px 4px; outline:none; width:100%;
    }
    .note-title-input::placeholder { color:var(--text-muted); }
    .note-body {
      flex:1; min-height:280px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; color:var(--text); font-family:inherit; font-size:.93rem;
      line-height:1.65; resize:none; outline:none; transition:border-color .2s;
    }
    .note-body:focus { border-color:var(--accent); }

    /* Format toolbar */
    .fmt-toolbar {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-sm);
    }
    .fmt-btn {
      padding:5px 12px; border-radius:6px; border:1px solid var(--border);
      background:var(--surface2); color:var(--text); font-family:inherit; font-size:.87rem;
      font-weight:700; cursor:pointer; transition:background .15s,color .15s;
    }
    .fmt-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* Note editor save */
    .note-editor-footer {
      padding:14px 20px; display:flex; justify-content:flex-end;
      border-top:1px solid var(--border);
    }

    /* Note bar meta */
    .note-body-preview {
      font-size:.78rem; color:var(--text-muted); white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; max-width:380px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     PAGE: HÁBITOS
════════════════════════════════════════ -->
<div class="page active" id="page-habits">
  <header>
    <div class="h-left">
      <button class="icon-btn" id="btn-hamburger" title="Notas Rápidas">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect y="0" width="18" height="2" rx="1" fill="currentColor"/>
          <rect y="6" width="18" height="2" rx="1" fill="currentColor"/>
          <rect y="12" width="18" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="h-center"><h1>Hábitos</h1></div>
    <div class="h-right">
      <button class="icon-btn" id="btn-calendar" title="Calendario de racha">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 8h16" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 2v3M14 2v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="7" cy="12" r="1" fill="currentColor"/>
          <circle cx="10" cy="12" r="1" fill="currentColor"/>
          <circle cx="13" cy="12" r="1" fill="currentColor"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-add-habit" title="Nuevo hábito">+</button>
    </div>
  </header>

  <div class="content">
    <div class="empty-state" id="empty-habits">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="32" stroke="#7c6ef7" stroke-width="1.5" stroke-dasharray="6 4"/>
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="26" fill="#7c6ef7">✦</text>
      </svg>
      <p>Sin hábitos aún.<br/>Pulsa <strong>+</strong> para crear el primero.</p>
    </div>
    <div class="habit-list" id="habit-list"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE: NOTAS RÁPIDAS (list)
════════════════════════════════════════ -->
<div class="page" id="page-notes">
  <header>
    <div class="h-left">
      <button class="icon-btn" id="btn-go-habits" title="Ir a Hábitos">H</button>
    </div>
    <div class="h-center"><h1>Notas Rápidas</h1></div>
    <div class="h-right">
      <button class="icon-btn" id="btn-add-note" title="Nueva nota">+</button>
    </div>
  </header>
  <div class="content">
    <div class="empty-state" id="empty-notes">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <rect x="16" y="12" width="40" height="50" rx="5" stroke="#7c6ef7" stroke-width="1.5" stroke-dasharray="6 4"/>
        <path d="M26 28h20M26 36h14" stroke="#7c6ef7" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p>Sin notas aún.<br/>Pulsa <strong>+</strong> para crear la primera.</p>
    </div>
    <div class="note-list" id="note-list"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE: NOTE EDITOR
════════════════════════════════════════ -->
<div class="page" id="page-note-editor">
  <div class="note-editor-header">
    <div class="h-left">
      <button class="icon-btn" id="btn-back-notes" title="Volver a Notas">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="h-center"><h1 id="editor-title-label">Nueva nota</h1></div>
    <div class="h-right"></div>
  </div>

  <div class="note-sheet">
    <input type="text" class="note-title-input" id="new-note-title" placeholder="Título de la nota…"/>
    <div class="fmt-toolbar">
      <button class="fmt-btn" id="fmt-bold" title="Negrita"><b>B</b></button>
      <button class="fmt-btn" id="fmt-strike" title="Tachado">—</button>
      <button class="fmt-btn" id="fmt-list" title="Lista">✱</button>
    </div>
    <textarea class="note-body" id="new-note-body" placeholder="Escribe tu nota aquí…"></textarea>
  </div>

  <div class="note-editor-footer">
    <button class="btn-save" id="btn-save-note">Guardar nota</button>
  </div>
</div>

<!-- ═══════════════════════════ MODALS ══════════════════════════ -->

<!-- Create Habit -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <h2>✨ Nuevo hábito</h2>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="create-name" placeholder="Ej. Leer 20 minutos"/>
    </div>
    <div class="form-group">
      <label>Días</label>
      <div class="days-grid" id="create-days"></div>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-row" id="create-colors"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" data-close="modal-create">Cancelar</button>
      <button class="btn-save" id="create-save">Guardar</button>
    </div>
  </div>
</div>

<!-- Edit Habit -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h2>✏️ Editar hábito</h2>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="edit-name" placeholder="Nombre del hábito"/>
    </div>
    <div class="form-group">
      <label>Días</label>
      <div class="days-grid" id="edit-days"></div>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-row" id="edit-colors"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" data-close="modal-edit">Cancelar</button>
      <button class="btn-save" id="edit-save">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- Confirm Delete (shared) -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal">
    <h2>🗑️ Eliminar</h2>
    <p class="confirm-text">¿Eliminar <strong id="delete-item-name">"..."</strong>?<br/>Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn-cancel" data-close="modal-delete">Cancelar</button>
      <button class="btn-danger" id="delete-confirm">Eliminar</button>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="modal-overlay" id="modal-calendar">
  <div class="modal">
    <div class="cal-header">
      <span class="cal-month-title" id="cal-title"></span>
      <div class="cal-streak-badge">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <path d="M10 2c0 4-5 6-5 10a5 5 0 0010 0c0-4-5-6-5-10z" fill="#7c6ef7"/>
        </svg>
        Racha: <span id="cal-streak">0</span> día(s)
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" data-close="modal-calendar">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════ CONSTANTS & STATE ═══════════════ */
const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
// Metallic gradient palette — each entry: { grad: CSS gradient, hex: representative mid-color for contrast calc }
const PALETTE = [
  { grad:'linear-gradient(135deg,#7a5c00,#ffd700,#b38600,#ffe87c,#7a5c00)', hex:'#c8a600', label:'Oro'      },
  { grad:'linear-gradient(135deg,#5a5a5a,#e8e8e8,#9e9e9e,#ffffff,#5a5a5a)', hex:'#b0b0b0', label:'Plata'    },
  { grad:'linear-gradient(135deg,#5c2800,#cd7f32,#8b4513,#e8a068,#5c2800)', hex:'#a05020', label:'Bronce'   },
  { grad:'linear-gradient(135deg,#1a2e5c,#4a90d9,#1e4080,#79b8ff,#1a2e5c)', hex:'#1e4080', label:'Acero'    },
  { grad:'linear-gradient(135deg,#003d20,#00e676,#00692f,#69ffa8,#003d20)', hex:'#006b30', label:'Esmeralda'},
  { grad:'linear-gradient(135deg,#5c0000,#e60026,#8b0000,#ff5566,#5c0000)', hex:'#8b0000', label:'Rubí'     },
  { grad:'linear-gradient(135deg,#2d0060,#9b59b6,#4b0082,#cc88ff,#2d0060)', hex:'#4b0082', label:'Amatista' },
  { grad:'linear-gradient(135deg,#1a1a1a,#6e6e6e,#2a2a2a,#aaaaaa,#1a1a1a)', hex:'#303030', label:'Titanio'  },
];

let habits    = JSON.parse(localStorage.getItem('habitos_h') || '[]');
let notes     = JSON.parse(localStorage.getItem('habitos_n') || '[]');
// perfectDays: Set of "YYYY-MM-DD" strings where user completed all habits
let perfectDays = new Set(JSON.parse(localStorage.getItem('habitos_pd') || '[]'));

let editingHabitId = null;
let deletingId     = null;
let deletingType   = null; // 'habit' | 'note'
let editingNoteId  = null; // null = new note

/* ═══════════════ PERSISTENCE ═══════════════ */
function saveHabits()       { localStorage.setItem('habitos_h', JSON.stringify(habits)); }
function saveNotes()        { localStorage.setItem('habitos_n', JSON.stringify(notes)); }
function savePerfectDays()  { localStorage.setItem('habitos_pd', JSON.stringify([...perfectDays])); }

/* ═══════════════ HELPERS ═══════════════ */
function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function checkPerfectDay(){
  const key = todayKey();
  if(habits.length === 0) {
    perfectDays.delete(key);
    savePerfectDays();
    return;
  }
  const all = habits.every(h => h.completed);
  if(all){
    perfectDays.add(key);
  } else {
    perfectDays.delete(key);
  }
  savePerfectDays();
}

/* ═══════════════ NAV ═══════════════ */
function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-hamburger').addEventListener('click', () => { renderNotes(); showPage('page-notes'); });
document.getElementById('btn-go-habits').addEventListener('click', () => showPage('page-habits'));
document.getElementById('btn-back-notes').addEventListener('click', () => { showPage('page-notes'); });

/* ═══════════════ MODAL UTILS ═══════════════ */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if(e.target === ov) closeModal(ov.id); });
});

/* ═══════════════ DAYS SELECTOR ═══════════════ */
function buildDays(cid, sel=[]){
  const c = document.getElementById(cid); c.innerHTML='';
  DAYS.forEach(d => {
    const b = document.createElement('button');
    b.type='button'; b.className='day-btn'+(sel.includes(d)?' selected':''); b.textContent=d;
    b.addEventListener('click',()=>b.classList.toggle('selected'));
    c.appendChild(b);
  });
}
function getSelDays(cid){
  return [...document.getElementById(cid).querySelectorAll('.day-btn.selected')].map(b=>b.textContent);
}

/* ═══════════════ COLOR PICKER ═══════════════ */
function buildColors(cid, iid, selGrad, selHex){
  const c = document.getElementById(cid); c.innerHTML='';
  PALETTE.forEach((p, idx) => {
    const sw = document.createElement('div');
    sw.className='color-swatch'+(selGrad===p.grad?' active':'');
    sw.style.background = p.grad;
    sw.title = p.label;
    sw.addEventListener('click',()=>{
      c.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      sw.dataset.grad = p.grad;
      sw.dataset.hex  = p.hex;
      document.getElementById(iid).value = p.hex;
    });
    // store data on element to retrieve later
    sw.dataset.grad = p.grad;
    sw.dataset.hex  = p.hex;
    c.appendChild(sw);
  });
  // Custom solid color fallback
  const inp = document.createElement('input'); inp.type='color'; inp.id=iid;
  inp.value = selHex && selHex.startsWith('#') ? selHex : PALETTE[0].hex;
  inp.title = 'Color personalizado';
  inp.addEventListener('input',()=>c.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active')));
  c.appendChild(inp);
}
function getSelColor(cid, iid){
  const a = document.getElementById(cid).querySelector('.color-swatch.active');
  if(a) return { grad: a.dataset.grad, hex: a.dataset.hex };
  const hex = document.getElementById(iid).value;
  return { grad: hex, hex }; // solid color as gradient fallback
}

/* ═══════════════ CONTRAST HELPER ═══════════════ */
// Returns '#fff' or '#1a1a1a' depending on which contrasts better with bgHex
function contrastColor(bgHex) {
  const hex = bgHex.replace('#','');
  if(hex.length < 6) return '#fff';
  const r = parseInt(hex.slice(0,2),16);
  const g = parseInt(hex.slice(2,4),16);
  const b = parseInt(hex.slice(4,6),16);
  // Relative luminance (WCAG formula)
  const toLinear = v => { const s=v/255; return s<=0.04045?s/12.92:Math.pow((s+0.055)/1.055,2.4); };
  const L = 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
  return L > 0.179 ? '#1a1a2e' : '#ffffff';
}

/* ═══════════════ SVGs ═══════════════ */
const svgCircle = (done, ink) => done
  ? `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7.5" stroke="${ink}" stroke-opacity=".55" stroke-width="1.5"/><path d="M5.5 9l2.5 2.5 4.5-5" stroke="${ink}" stroke-opacity=".7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  : `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7.5" stroke="${ink}" stroke-opacity=".75" stroke-width="1.5"/></svg>`;
const svgPencil = ink => `<svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M14.1 2.5l3.4 3.4-10 10L4 17l1.1-3.5 9-11z" stroke="${ink}" stroke-opacity=".8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgClose  = ink => `<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="${ink}" stroke-opacity=".8" stroke-width="1.8" stroke-linecap="round"/></svg>`;

/* ═══════════════ RENDER HABITS ═══════════════ */
function renderHabits(){
  const list = document.getElementById('habit-list');
  const empty = document.getElementById('empty-habits');
  list.innerHTML = '';
  empty.style.display = habits.length ? 'none' : 'flex';

  habits.forEach(h => {
    const bar = document.createElement('div');
    bar.className = 'habit-bar'+(h.completed?' completed':'');
    // Support both old (h.color hex) and new (h.grad + h.colorHex) formats
    const grad = h.grad || h.color || PALETTE[0].grad;
    const hex  = h.colorHex || h.color || PALETTE[0].hex;
    const ink  = contrastColor(hex);
    const outline = '-1px -1px 0 rgba(0,0,0,.65),1px -1px 0 rgba(0,0,0,.65),-1px 1px 0 rgba(0,0,0,.65),1px 1px 0 rgba(0,0,0,.65)';
    const pillStyle = `background:rgba(0,0,0,.22);color:#fff;text-shadow:${outline};`;
    bar.innerHTML=`
      <div class="bar-inner" style="background:${grad}; box-shadow:0 4px 22px rgba(0,0,0,.5);">
        <span class="bar-name" style="color:#fff; text-shadow:${outline};">${escHtml(h.name)}</span>
        <div class="bar-meta">${h.days.map(d=>`<span class="day-pill" style="${pillStyle}">${d}</span>`).join('')}</div>
        <div class="bar-actions">
          <button class="btn-ic btn-circle" title="${h.completed?'Desmarcar':'Completar'}" style="border-color:rgba(255,255,255,.7);">${svgCircle(h.completed,'#fff')}</button>
          <button class="btn-ic btn-sm edit-btn" title="Editar">${svgPencil('#fff')}</button>
          <button class="btn-ic btn-sm del" title="Eliminar">${svgClose('#fff')}</button>
        </div>
      </div>`;
    bar.querySelector('.btn-circle').addEventListener('click',()=>toggleHabit(h.id));
    bar.querySelector('.edit-btn').addEventListener('click',()=>openEditHabit(h.id));
    bar.querySelector('.del').addEventListener('click',()=>openDelete(h.id,'habit',h.name));
    list.appendChild(bar);
  });
}

function toggleHabit(id){
  const h=habits.find(x=>x.id===id); if(!h) return;
  h.completed=!h.completed; saveHabits(); checkPerfectDay(); renderHabits();
}

/* ═══════════════ CREATE HABIT ═══════════════ */
document.getElementById('btn-add-habit').addEventListener('click',()=>{
  document.getElementById('create-name').value='';
  buildDays('create-days',[]);
  buildColors('create-colors','cp-create', PALETTE[0].grad, PALETTE[0].hex);
  openModal('modal-create');
  setTimeout(()=>document.getElementById('create-name').focus(),120);
});

document.getElementById('create-save').addEventListener('click',()=>{
  const name=document.getElementById('create-name').value.trim();
  if(!name){ 
    alert('Por favor, ingresa el nombre del hábito.');
    flash('create-name'); 
    return; 
  }
  const days=getSelDays('create-days');
  if(!days.length){ 
    alert('Por favor, selecciona al menos un día de la semana.'); 
    return; 
  }
  const {grad, hex}=getSelColor('create-colors','cp-create');
  habits.push({id:Date.now(),name,days,grad,colorHex:hex,completed:false});
  saveHabits(); 
  checkPerfectDay(); // Update streak logic immediately
  renderHabits(); 
  closeModal('modal-create');
});

/* ═══════════════ EDIT HABIT ═══════════════ */
function openEditHabit(id){
  editingHabitId=id;
  const h=habits.find(x=>x.id===id);
  document.getElementById('edit-name').value=h.name;
  buildDays('edit-days',h.days);
  buildColors('edit-colors','cp-edit', h.grad||h.color, h.colorHex||h.color);
  openModal('modal-edit');
  setTimeout(()=>document.getElementById('edit-name').focus(),120);
}
document.getElementById('edit-save').addEventListener('click',()=>{
  const name=document.getElementById('edit-name').value.trim();
  if(!name){ 
    alert('El nombre del hábito no puede estar vacío.');
    flash('edit-name'); 
    return; 
  }
  const days=getSelDays('edit-days');
  if(!days.length){ 
    alert('Debes seleccionar al menos un día.'); 
    return; 
  }
  const {grad, hex}=getSelColor('edit-colors','cp-edit');
  const h=habits.find(x=>x.id===editingHabitId);
  if(h){h.name=name;h.days=days;h.grad=grad;h.colorHex=hex;}
  saveHabits(); 
  checkPerfectDay(); // Update streak logic immediately
  renderHabits(); 
  closeModal('modal-edit');
});

/* ═══════════════ DELETE (shared) ═══════════════ */
function openDelete(id,type,name){
  deletingId=id; deletingType=type;
  document.getElementById('delete-item-name').textContent=`"${name}"`;
  openModal('modal-delete');
}
document.getElementById('delete-confirm').addEventListener('click',()=>{
  if(deletingType==='habit'){
    habits=habits.filter(x=>x.id!==deletingId);
    saveHabits(); 
    checkPerfectDay(); // Update streak if habits count changes
    renderHabits();
  } else {
    notes=notes.filter(x=>x.id!==deletingId);
    saveNotes(); renderNotes();
  }
  closeModal('modal-delete');
});

/* ═══════════════ CALENDAR ═══════════════ */
document.getElementById('btn-calendar').addEventListener('click',()=>{
  buildCalendar(); openModal('modal-calendar');
});

function buildCalendar(){
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const todayD=now.getDate();

  // Month name
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-title').textContent=`${months[month]} ${year}`;

  // Streak: count consecutive days ending today that are perfect
  let streak=0;
  const check=new Date(now);
  while(true){
    const key=`${check.getFullYear()}-${String(check.getMonth()+1).padStart(2,'0')}-${String(check.getDate()).padStart(2,'0')}`;
    if(perfectDays.has(key)){ streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  document.getElementById('cal-streak').textContent=streak;

  // Grid
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  // Day names header
  ['D','L','M','X','J','V','S'].forEach(d=>{
    const el=document.createElement('div'); el.className='cal-day-name'; el.textContent=d;
    grid.appendChild(el);
  });

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div'); el.className='cal-cell empty'; grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const el=document.createElement('div'); el.className='cal-cell';
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(d===todayD) el.classList.add('today');
    if(perfectDays.has(key)) el.classList.add('perfect');
    el.textContent=d;
    grid.appendChild(el);
  }
}

/* ═══════════════ NOTES LIST ═══════════════ */
function renderNotes(){
  const list=document.getElementById('note-list');
  const empty=document.getElementById('empty-notes');
  list.innerHTML='';
  empty.style.display=notes.length?'none':'flex';

  notes.forEach(n=>{
    const bar=document.createElement('div');
    bar.className='note-bar'+(n.done?' done':'');
    const bg = n.done
      ? 'linear-gradient(135deg,#2a2a3a,#3a3a55)'
      : 'linear-gradient(135deg,#2d0060,#9b59b6,#4b0082,#cc88ff,#2d0060)';
    const outline = '-1px -1px 0 rgba(0,0,0,.65),1px -1px 0 rgba(0,0,0,.65),-1px 1px 0 rgba(0,0,0,.65),1px 1px 0 rgba(0,0,0,.65)';
    bar.innerHTML=`
      <div class="bar-inner" style="background:${bg}; box-shadow:0 4px 22px rgba(0,0,0,.5);">
        <span class="bar-name" style="color:#fff; text-shadow:${outline};">${escHtml(n.title||'Sin título')}</span>
        <div class="bar-meta"><span class="note-body-preview" style="color:rgba(255,255,255,.7); text-shadow:${outline};">${escHtml((n.body||'').replace(/\n/g,' ').slice(0,80))}</span></div>
        <div class="bar-actions">
          <button class="btn-ic btn-circle" title="${n.done?'Desmarcar':'Completar'}" style="border-color:rgba(255,255,255,.7);">${svgCircle(n.done,'#fff')}</button>
          <button class="btn-ic btn-sm del" title="Eliminar">${svgClose('#fff')}</button>
        </div>
      </div>`;
    bar.querySelector('.btn-circle').addEventListener('click',()=>toggleNote(n.id));
    bar.querySelector('.del').addEventListener('click',()=>openDelete(n.id,'note',n.title||'Sin título'));
    list.appendChild(bar);
  });
}

function toggleNote(id){
  const n=notes.find(x=>x.id===id); if(!n) return;
  n.done=!n.done; saveNotes(); renderNotes();
}

/* ═══════════════ NOTE EDITOR ═══════════════ */
document.getElementById('btn-add-note').addEventListener('click',()=>{
  editingNoteId=null;
  document.getElementById('new-note-title').value='';
  document.getElementById('new-note-body').value='';
  document.getElementById('editor-title-label').textContent='Nueva nota';
  showPage('page-note-editor');
  setTimeout(()=>document.getElementById('new-note-title').focus(),120);
});

// Format buttons (work on textarea)
function applyFmt(type){
  const ta=document.getElementById('new-note-body');
  const start=ta.selectionStart, end=ta.selectionEnd;
  const sel=ta.value.substring(start,end);
  const before=ta.value.substring(0,start), after=ta.value.substring(end);

  if(type==='bold'){
    // wrap selection — we use a unicode bold hack for plain textarea
    const bold={' ':' ','a':'𝗮','b':'𝗯','c':'𝗰','d':'𝗱','e':'𝗲','f':'𝗳','g':'𝗴','h':'𝗵','i':'𝗶',
      'j':'𝗷','k':'𝗸','l':'𝗹','m':'𝗺','n':'𝗻','o':'𝗼','p':'𝗽','q':'𝗾','r':'𝗿','s':'𝘀',
      't':'𝘁','u':'𝘂','v':'𝘃','w':'𝘄','x':'𝘅','y':'𝘆','z':'𝘇',
      'A':'𝗔','B':'𝗕','C':'𝗖','D':'𝗗','E':'𝗘','F':'𝗙','G':'𝗚','H':'𝗛','I':'𝗜',
      'J':'𝗝','K':'𝗞','L':'𝗟','M':'𝗠','N':'𝗡','O':'𝗢','P':'𝗣','Q':'𝗤','R':'𝗥','S':'𝗦',
      'T':'𝗧','U':'𝗨','V':'𝗩','W':'𝗪','X':'𝗫','Y':'𝗬','Z':'𝗭'};
    const res=sel.split('').map(ch=>bold[ch]||ch).join('');
    ta.value=before+res+after;
  } else if(type==='strike'){
    const res=sel.split('').map(ch=>ch+'\u0336').join('');
    ta.value=before+res+after;
  } else if(type==='list'){
    // prefix each line with "• "
    const lines=ta.value.split('\n');
    // find which lines are covered
    let pos=0, startLine=-1, endLine=-1;
    lines.forEach((l,i)=>{
      if(pos<=start) startLine=i;
      if(pos<=end) endLine=i;
      pos+=l.length+1;
    });
    for(let i=startLine;i<=endLine;i++){
      if(!lines[i].startsWith('• ')) lines[i]='• '+lines[i];
    }
    ta.value=lines.join('\n');
  }
  ta.focus();
}

document.getElementById('fmt-bold').addEventListener('click',()=>applyFmt('bold'));
document.getElementById('fmt-strike').addEventListener('click',()=>applyFmt('strike'));
document.getElementById('fmt-list').addEventListener('click',()=>applyFmt('list'));

document.getElementById('btn-save-note').addEventListener('click',()=>{
  const title=document.getElementById('new-note-title').value.trim()||'Sin título';
  const body=document.getElementById('new-note-body').value;
  notes.push({id:Date.now(),title,body,done:false});
  saveNotes(); renderNotes(); showPage('page-notes');
});

/* ═══════════════ HELPERS ═══════════════ */
function flash(id){
  const el=document.getElementById(id);
  el.style.borderColor='#f76c6c';
  setTimeout(()=>el.style.borderColor='',700);
}

/* ═══════════════ INIT ═══════════════ */
renderHabits();
renderNotes();
</script>
